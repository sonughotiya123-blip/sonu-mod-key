<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sonix Premium Admin - Mobile Optimized</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #050507; --card: #121217; --primary: #6366f1; 
            --accent: #06b6d4; --text: #ffffff; --text-dim: #94a3b8;
            --success: #10b981; --error: #ef4444; --border: rgba(255,255,255,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; padding-bottom: 80px; }

        /* Desktop Sidebar - Hidden on Mobile */
        .sidebar { width: 260px; height: 100vh; position: fixed; left: 0; top: 0; background: var(--card); border-right: 1px solid var(--border); padding: 30px; display: none; }
        
        /* Navigation (Bottom on Mobile, Sidebar on Desktop) */
        .nav-container { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(18, 18, 23, 0.95); backdrop-filter: blur(15px); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-btn { background: none; border: none; color: var(--text-dim); display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: var(--primary); }
        .nav-btn i { font-size: 20px; }

        /* Main Layout */
        .main { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 700; background: linear-gradient(to right, #fff, var(--text-dim)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Key Generator Box (Main Feature) */
        .gen-card { background: linear-gradient(135deg, var(--card) 0%, #1a1a24 100%); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .gen-card h3 { font-size: 16px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        
        .input-row { display: flex; flex-direction: column; gap: 12px; }
        select { width: 100%; padding: 15px; background: #1e1e26; border: 1px solid var(--border); border-radius: 12px; color: white; font-size: 16px; outline: none; }
        .btn-gen { width: 100%; padding: 16px; background: linear-gradient(45deg, var(--primary), var(--accent)); border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4); }

        /* Stats Grid */
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-box { background: var(--card); padding: 15px; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
        .stat-box span { font-size: 12px; color: var(--text-dim); }
        .stat-box h2 { font-size: 24px; margin-top: 5px; }

        /* Key Table/List */
        .section-title { font-size: 18px; margin-bottom: 15px; font-weight: 600; padding-left: 5px; }
        .key-item { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.4s ease; }
        .key-info h4 { color: var(--accent); font-family: monospace; font-size: 16px; letter-spacing: 1px; }
        .key-info p { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
        .status-tag { font-size: 10px; padding: 4px 8px; border-radius: 6px; font-weight: 700; text-transform: uppercase; }
        .tag-new { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .tag-used { background: rgba(239, 68, 68, 0.1); color: var(--error); }

        .btn-copy { background: #22222d; border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; cursor: pointer; }

        /* Sections */
        .content-section { display: none; }
        .content-section.active { display: block; animation: slideUp 0.3s ease; }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Responsive Table for Desktop */
        @media (min-width: 768px) {
            body { padding-bottom: 0; padding-left: 260px; }
            .sidebar { display: flex; }
            .nav-container { display: none; }
            .main { padding: 40px; }
            .input-row { flex-direction: row; }
            .stats { grid-template-columns: repeat(4, 1fr); }
        }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px); background: var(--primary); color: white; padding: 12px 25px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 2000; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2 style="color:var(--primary); margin-bottom:40px;">SONIX PRO</h2>
        <div style="display:flex; flex-direction:column; gap:20px;">
            <p onclick="switchTab('dashboard')" style="cursor:pointer;"><i class="fa-solid fa-house"></i> Dashboard</p>
            <p onclick="switchTab('users')" style="cursor:pointer;"><i class="fa-solid fa-users"></i> Users</p>
            <p onclick="switchTab('settings')" style="cursor:pointer;"><i class="fa-solid fa-gear"></i> Settings</p>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <h1>Sonix Manager <span style="font-size: 12px; background:var(--primary); padding:2px 6px; border-radius:4px;">V1.5</span></h1>
            <i class="fa-solid fa-circle-user" style="font-size: 24px; color: var(--primary);"></i>
        </div>

        <div id="dashboard" class="content-section active">
            <div class="stats">
                <div class="stat-box"><span>Total Keys</span><h2 id="count-total">0</h2></div>
                <div class="stat-box"><span>Unused</span><h2 id="count-new" style="color:var(--success)">0</h2></div>
            </div>

            <div class="gen-card">
                <h3><i class="fa-solid fa-bolt" style="color:var(--accent)"></i> Quick Key Generator</h3>
                <div class="input-row">
                    <select id="duration">
                        <option value="1h">1 Hour (Demo)</option>
                        <option value="1d">24 Hours Premium</option>
                        <option value="7d">7 Days Premium</option>
                        <option value="30d">30 Days Premium</option>
                        <option value="life">Lifetime VIP</option>
                    </select>
                    <button class="btn-gen" onclick="generateKey()">GENERATE KEY</button>
                </div>
            </div>

            <h3 class="section-title">Recent Keys</h3>
            <div id="keyList">
                </div>
        </div>

        <div id="users" class="content-section">
            <h3 class="section-title">Active Devices</h3>
            <div id="userList" style="text-align: center; color: var(--text-dim); margin-top: 50px;">
                <i class="fa-solid fa-mobile-screen-button" style="font-size: 40px; margin-bottom: 10px;"></i>
                <p>Abhi tak koi device link nahi hai.</p>
            </div>
        </div>

        <div id="settings" class="content-section">
            <h3 class="section-title">Admin Controls</h3>
            <div class="gen-card">
                <button class="btn-gen" style="background:var(--error)" onclick="deleteAllKeys()">DELETE ALL KEYS</button>
            </div>
        </div>
    </div>

    <div class="nav-container">
        <button class="nav-btn active" onclick="switchTab('dashboard', this)"><i class="fa-solid fa-chart-line"></i>Home</button>
        <button class="nav-btn" onclick="switchTab('users', this)"><i class="fa-solid fa-users"></i>Users</button>
        <button class="nav-btn" onclick="switchTab('settings', this)"><i class="fa-solid fa-shield-halved"></i>Admin</button>
    </div>

    <div id="toast">Key Copied!</div>

    <script>
        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOf0NjgjqIfjq-vCvHJivcP2w-xIp7eDQ",
            databaseURL: "https://sonixtools-admin-default-rtdb.firebaseio.com/",
            projectId: "sonixtools-admin"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- Tabs Navigation ---
        function switchTab(tabId, btn) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }

        // --- Key Generator ---
        function generateKey() {
            const dur = document.getElementById('duration').value;
            const key = "SNX-" + Math.random().toString(36).substring(2, 6).toUpperCase() + "-" + Math.random().toString(36).substring(2, 6).toUpperCase();
            
            const expiry = new Date();
            if(dur === '1h') expiry.setHours(expiry.getHours() + 1);
            else if(dur === '1d') expiry.setDate(expiry.getDate() + 1);
            else if(dur === 'life') expiry.setFullYear(2099);

            db.ref('keys/' + key).set({
                key_code: key, duration: dur, is_used: 0, expiry: expiry.toISOString(), device_id: "NONE"
            }).then(() => showToast("SNX Key Generated!"));
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        function copy(text) {
            navigator.clipboard.writeText(text);
            showToast("Copied to Clipboard!");
        }

        function deleteKey(key) {
            if(confirm("Delete this key?")) db.ref('keys/' + key).remove();
        }

        function deleteAllKeys() {
            if(confirm("Kya aap sach me saari keys delete karna chahte hain?")) db.ref('keys').remove();
        }

        // --- Live Data ---
        db.ref('keys').on('value', snap => {
            const data = snap.val();
            const list = document.getElementById('keyList');
            list.innerHTML = "";
            let t = 0, n = 0;
            if(data) {
                Object.keys(data).reverse().forEach(k => {
                    const item = data[k]; t++; if(!item.is_used) n++;
                    const statusClass = item.is_used ? 'tag-used' : 'tag-new';
                    const statusText = item.is_used ? 'USED' : 'NEW';
                    
                    list.innerHTML += `
                        <div class="key-item">
                            <div class="key-info">
                                <h4>${item.key_code}</h4>
                                <p><span class="status-tag ${statusClass}">${statusText}</span> • ${item.duration}</p>
                            </div>
                            <div style="display:flex; gap:8px;">
                                <button class="btn-copy" onclick="copy('${item.key_code}')"><i class="fa-regular fa-copy"></i></button>
                                <button class="btn-copy" style="color:var(--error)" onclick="deleteKey('${item.key_code}')"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </div>
                    `;
                });
            }
            document.getElementById('count-total').innerText = t;
            document.getElementById('count-new').innerText = n;
        });
    </script>
</body>
</html>
