<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonix Key Manager - Premium</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #09090b;
            --surface-color: #18181b;
            --surface-light: #27272a;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --secondary: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #a1a1aa;
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.1);
            --danger: #ef4444;
            --danger-bg: rgba(239, 68, 68, 0.1);
            --border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styling */
        .sidebar {
            width: 260px;
            background-color: var(--surface-color);
            border-right: 1px solid var(--border);
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .nav-item.active, .nav-item:hover {
            background-color: rgba(99, 102, 241, 0.1);
            color: var(--primary);
        }

        /* Main Content Styling */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }

        .stat-title {
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Generator Section */
        .generator-card {
            background: linear-gradient(145deg, var(--surface-color), #111113);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .generator-header {
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        select {
            flex: 1;
            padding: 14px 20px;
            background-color: var(--surface-light);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        select:focus {
            border-color: var(--primary);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }

        /* Data Table */
        .table-container {
            background-color: var(--surface-color);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--surface-light);
            padding: 16px 24px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            font-size: 15px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: rgba(255, 255, 255, 0.02);
        }

        .key-text {
            font-family: monospace;
            font-size: 16px;
            color: var(--secondary);
            font-weight: 600;
        }

        /* Badges & Buttons inside Table */
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .badge.active { background: var(--success-bg); color: var(--success); }
        .badge.used { background: var(--danger-bg); color: var(--danger); }

        .action-btns {
            display: flex;
            gap: 10px;
        }

        .btn-icon {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text-muted);
            width: 36px;
            height: 36px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-icon:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-icon.delete:hover {
            background: var(--danger);
            border-color: var(--danger);
        }

        /* Custom Toast Notification */
        #toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--surface-light);
            border-left: 4px solid var(--primary);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            transform: translateX(150%);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }

        #toast.show {
            transform: translateX(0);
        }
    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-bolt"></i> SONIX ADMIN
        </div>
        <a href="#" class="nav-item active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-key"></i> Manage Keys</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-users"></i> App Users</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-gear"></i> Settings</a>
    </nav>

    <main class="main-content">
        <div class="header">
            <div>
                <h1>Overview</h1>
                <p style="color: var(--text-muted); margin-top: 5px;">Manage your access keys securely.</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <img src="https://ui-avatars.com/api/?name=Admin&background=6366f1&color=fff" alt="Admin" style="border-radius: 50%; width: 45px;">
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-title">Total Keys Generated</span>
                <span class="stat-value" id="totalKeys">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Active / Unused Keys</span>
                <span class="stat-value" id="unusedKeys" style="color: var(--success);">0</span>
            </div>
            <div class="stat-card">
                <span class="stat-title">Keys In Use</span>
                <span class="stat-value" id="usedKeys" style="color: var(--danger);">0</span>
            </div>
        </div>

        <div class="generator-card">
            <div class="generator-header">
                <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--primary);"></i> Generate New Access Key
            </div>
            <div class="input-group">
                <select id="duration">
                    <option value="1h">1 Hour (Trial License)</option>
                    <option value="6h">6 Hours License</option>
                    <option value="12h">12 Hours License</option>
                    <option value="1d">1 Day Premium</option>
                    <option value="7d">7 Days Premium</option>
                    <option value="30d">1 Month Premium</option>
                    <option value="life">Lifetime VIP Access</option>
                </select>
                <button class="btn-primary" onclick="generateKey()">
                    <i class="fa-solid fa-plus"></i> Create Key
                </button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Access Key</th>
                        <th>Duration</th>
                        <th>Expiry Date</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="keyList">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="toast"><i class="fa-solid fa-circle-check" style="color: var(--primary); font-size: 20px;"></i> <span id="toastMessage">Action Successful</span></div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        // (Isme apni asli details lagana mat bhulna)
        const firebaseConfig = {
            apiKey: "AIzaSyBOf0NjgjqIfjq-vCvHJivcP2w-xIp7eDQ",
            authDomain: "sonixtools-admin.firebaseapp.com",
            projectId: "sonixtools-admin",
            databaseURL: "https://sonixtools-admin-default-rtdb.firebaseio.com/",
            storageBucket: "sonixtools-admin.firebasestorage.app",
            messagingSenderId: "740712113688",
            appId: "1:740712113688:web:4160607365ca0552b0456d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Custom Toast Function (Alert box ko replace karne ke liye)
        function showToast(message) {
            const toast = document.getElementById("toast");
            document.getElementById("toastMessage").innerText = message;
            toast.classList.add("show");
            setTimeout(() => {
                toast.classList.remove("show");
            }, 3000);
        }

        // Generate Key Logic
        function generateKey() {
            const duration = document.getElementById('duration').value;
            const randomStr = Math.random().toString(36).substring(2, 10).toUpperCase();
            const fullKey = "SNX-" + randomStr; // Make it look premium

            const now = new Date();
            let expiry = new Date();

            if(duration === '1h') expiry.setHours(now.getHours() + 1);
            else if(duration === '6h') expiry.setHours(now.getHours() + 6);
            else if(duration === '12h') expiry.setHours(now.getHours() + 12);
            else if(duration === '1d') expiry.setDate(now.getDate() + 1);
            else if(duration === '7d') expiry.setDate(now.getDate() + 7);
            else if(duration === '30d') expiry.setDate(now.getDate() + 30);
            else if(duration === 'life') expiry = "2099-12-31T23:59:59";

            const keyData = {
                key_code: fullKey,
                duration: duration,
                expiry: expiry instanceof Date ? expiry.toISOString() : expiry,
                is_used: 0,
                device_id: "NOT_SET",
                created_at: new Date().toISOString()
            };

            db.ref('keys/' + fullKey).set(keyData).then(() => {
                showToast(`New Key Generated: ${fullKey}`);
            });
        }

        // Copy Key Logic
        function copyKey(keyString) {
            navigator.clipboard.writeText(keyString).then(() => {
                showToast(`Copied to clipboard: ${keyString}`);
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        // Delete Key Logic
        function deleteKey(key) {
            if(confirm("Are you sure you want to delete this key permanently?")) {
                db.ref('keys/' + key).remove().then(() => {
                    showToast("Key deleted successfully!");
                });
            }
        }

        // Format Date Function
        function formatDate(isoString) {
            if (isoString === "2099-12-31T23:59:59") return "Lifetime";
            const date = new Date(isoString);
            return date.toLocaleString('en-US', { 
                month: 'short', day: 'numeric', year: 'numeric', 
                hour: '2-digit', minute: '2-digit'
            });
        }

        // Live Listener from Firebase
        db.ref('keys').on('value', (snapshot) => {
            const data = snapshot.val();
            const listBody = document.getElementById('keyList');
            
            listBody.innerHTML = "";
            let total = 0, used = 0, unused = 0;

            if(data) {
                // Sort keys by latest created (Reverse order)
                const sortedKeys = Object.keys(data).reverse();

                sortedKeys.forEach(k => {
                    const item = data[k];
                    total++;
                    
                    let statusBadge = '';
                    if(item.is_used === 1) {
                        used++;
                        statusBadge = `<span class="badge used"><i class="fa-solid fa-lock"></i> Used</span>`;
                    } else {
                        unused++;
                        statusBadge = `<span class="badge active"><i class="fa-solid fa-unlock"></i> Unused</span>`;
                    }

                    // Mapping duration values for display
                    const durationMap = {
                        '1h': '1 Hour', '6h': '6 Hours', '12h': '12 Hours',
                        '1d': '1 Day', '7d': '7 Days', '30d': '1 Month', 'life': 'Lifetime'
                    };

                    listBody.innerHTML += `
                        <tr>
                            <td class="key-text">${item.key_code}</td>
                            <td>${durationMap[item.duration] || item.duration}</td>
                            <td style="color: var(--text-muted); font-size: 13px;">${formatDate(item.expiry)}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <div class="action-btns">
                                    <button class="btn-icon" onclick="copyKey('${item.key_code}')" title="Copy Key">
                                        <i class="fa-regular fa-copy"></i>
                                    </button>
                                    <button class="btn-icon delete" onclick="deleteKey('${item.key_code}')" title="Delete Key">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } else {
                listBody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 30px; color: var(--text-muted);">No keys found. Generate one to start!</td></tr>`;
            }

            // Update Top Stats
            document.getElementById('totalKeys').innerText = total;
            document.getElementById('usedKeys').innerText = used;
            document.getElementById('unusedKeys').innerText = unused;
        });
    </script>
</body>
</html>
