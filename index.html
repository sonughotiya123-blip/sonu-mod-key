<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonu Panel V1 - Admin Dashboard</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #0a0b1e;
            --card-bg: #161b33;
            --text: #ffffff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 0 20px rgba(112, 0, 255, 0.2);
            border: 1px solid rgba(0, 242, 255, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 28px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(0,242,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 242, 255, 0.4);
        }

        .key-display {
            margin-top: 25px;
            padding: 20px;
            background: rgba(0, 242, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            display: none;
            border: 1px dashed var(--primary);
        }

        .key-text {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            display: block;
            margin-bottom: 10px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
        }

        .key-list {
            margin-top: 40px;
            width: 100%;
            max-width: 600px;
        }

        .key-item {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .status-badge {
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 20px;
            margin-left: 10px;
        }

        .status-used { background: #ff3b3b; color: white; }
        .status-unused { background: #00c853; color: white; }

        .btn-delete {
            background: #ff3b3b;
            padding: 8px 12px;
            font-size: 12px;
            width: auto;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SONU PANEL V1</h1>
        
        <div class="form-group">
            <label>Choose Key Validity</label>
            <select id="duration">
                <option value="1h">1 Hour (Trial)</option>
                <option value="6h">6 Hours</option>
                <option value="12h">12 Hours</option>
                <option value="1d">1 Day</option>
                <option value="7d">1 Week</option>
                <option value="30d">1 Month</option>
                <option value="life">Lifetime</option>
            </select>
        </div>

        <button onclick="generateKey()">Generate New Key</button>

        <div id="resultBox" class="key-display">
            <small>Successfully Generated:</small>
            <span id="keyOutput" class="key-text">SONU-XXXX-XXXX</span>
            <button style="background:var(--primary); color:black; font-size: 12px; padding: 5px;" onclick="copyKey()">COPY KEY</button>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <small>Total Keys</small>
                <div id="totalKeys" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <small>Keys Used</small>
                <div id="activeKeys" class="stat-value">0</div>
            </div>
        </div>
    </div>

    <div class="key-list" id="keyList">
        <!-- Live Data -->
    </div>

    <script>
        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyBOf0NjgjqIfjq-vCvHJivcP2w-xIp7eDQ",
            authDomain: "sonixtools-admin.firebaseapp.com",
            projectId: "sonixtools-admin",
            databaseURL: "https://sonixtools-admin-default-rtdb.firebaseio.com/",
            storageBucket: "sonixtools-admin.firebasestorage.app",
            messagingSenderId: "740712113688",
            appId: "1:740712113688:web:4160607365ca0552b0456d"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function generateKey() {
            const duration = document.getElementById('duration').value;
            const randomStr = Math.random().toString(36).substring(2, 8).toUpperCase();
            const fullKey = "SONU-" + randomStr;

            const now = new Date();
            let expiry = new Date();

            if(duration === '1h') expiry.setHours(now.getHours() + 1);
            else if(duration === '6h') expiry.setHours(now.getHours() + 6);
            else if(duration === '12h') expiry.setHours(now.getHours() + 12);
            else if(duration === '1d') expiry.setDate(now.getDate() + 1);
            else if(duration === '7d') expiry.setDate(now.getDate() + 7);
            else if(duration === '30d') expiry.setDate(now.getDate() + 30);
            else if(duration === 'life') expiry = "2099-12-31T23:59:59";

            const keyData = {
                key_code: fullKey,
                duration: duration,
                expiry: expiry instanceof Date ? expiry.toISOString() : expiry,
                is_used: 0,
                device_id: "NOT_SET",
                status: 200
            };

            db.ref('keys/' + fullKey).set(keyData).then(() => {
                document.getElementById('keyOutput').innerText = fullKey;
                document.getElementById('resultBox').style.display = 'block';
            });
        }

        function copyKey() {
            const key = document.getElementById('keyOutput').innerText;
            navigator.clipboard.writeText(key);
            alert("Key Copied!");
        }

        function deleteKey(key) {
            if(confirm("Are you sure?")) db.ref('keys/' + key).remove();
        }

        // Live Listener
        db.ref('keys').on('value', (snapshot) => {
            const data = snapshot.val();
            const listDiv = document.getElementById('keyList');
            const totalKeys = document.getElementById('totalKeys');
            const activeKeys = document.getElementById('activeKeys');
            
            listDiv.innerHTML = "";
            let count = 0;
            let usedCount = 0;

            if(data) {
                Object.keys(data).forEach(k => {
                    const item = data[k];
                    count++;
                    if(item.is_used === 1) usedCount++;

                    const badge = item.is_used === 1 ? 
                        `<span class="status-badge status-used">USED</span>` : 
                        `<span class="status-badge status-unused">NEW</span>`;

                    listDiv.innerHTML += `
                        <div class="key-item">
                            <div class="key-info">
                                <strong>${item.key_code} ${badge}</strong>
                                <div style="font-size:11px; opacity:0.6;">Expires: ${new Date(item.expiry).toLocaleString()}</div>
                            </div>
                            <button class="btn-delete" onclick="deleteKey('${item.key_code}')">X</button>
                        </div>
                    `;
                });
            }
            totalKeys.innerText = count;
            activeKeys.innerText = usedCount;
        });
    </script>
</body>
</html>
